<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Photo coming soon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2f5a" />
      <stop offset="1" stop-color="#11203f" />
    </linearGradient>
    <pattern id="stripes" width="32" height="32" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect width="32" height="32" fill="transparent" />
      <rect width="6" height="32" fill="#4a6dab" opacity="0.18" />
    </pattern>
  </defs>
  <rect width="640" height="360" fill="url(#bg)" />
  <rect width="640" height="360" fill="url(#stripes)" />
  <rect x="6" y="6" width="628" height="348" fill="none" stroke="#7fc1ff" stroke-opacity="0.55" stroke-width="4" />
  <g font-family="'Press Start 2P', monospace" fill="#ffd54a" text-anchor="middle">
    <text x="320" y="180" font-size="22" letter-spacing="3">PHOTO</text>
    <text x="320" y="220" font-size="22" letter-spacing="3">COMING SOON</text>
  </g>
</svg>
